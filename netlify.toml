[build]
  # This tells Netlify which folder to serve to the web.
  # Change "frontend" to whatever folder contains your index.html and data.json
  publish = . 
  
  # Since you are generating the data.json locally/via Actions 
  # and pushing static files, Netlify doesn't need to run a framework build.
  command = "echo 'No build command required for static deployment'"

# Highly Recommended for Data Dashboards:
# This prevents the browser from aggressively caching your data.json file,
# ensuring users always see the latest prices when they refresh.
[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"